name: Deploy to Namecheap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      INDEXNOW_KEY: YOUR_INDEXNOW_KEY_HERE
      SITE_HOST: ashleybuilt.com
      SITE_BASE: https://ashleybuilt.com

    steps:
      - uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_PATH }}
          protocol: ftp
          port: 21

      - name: Notify IndexNow
        run: |
          set -e
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d "{\"host\":\"${SITE_HOST}\",\"key\":\"${INDEXNOW_KEY}\",\"keyLocation\":\"${SITE_BASE}/${INDEXNOW_KEY}.txt\",\"urlList\":[\"${SITE_BASE}/\",\"${SITE_BASE}/sitemap.xml\"]}"
